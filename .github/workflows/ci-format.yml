name: CI / Format & Lint

# Formatting and lint cover the whole repo (format:check scans **/*.md), so
# this workflow has no path filter — it runs on every push and pull request.
on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-format-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format-lint:
    name: Format & lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm run format:check

      - name: Lint
        run: pnpm run lint
